:root{
  --navy:#0B1F3B;
  --gold:#C6A75E;
  --gray:#F4F4F4;
  --charcoal:#2A2A2A;
  --beige:#F2E8D9;
  --orange:#E38B29;
  --brown:#8C6A4B;
  --muted:#6B7280;
  --card:#ffffff;
  --shadow: 0 10px 30px rgba(0,0,0,.08);
  --radius: 18px;
  --max: 1120px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", "Hiragino Sans", "Yu Gothic", "Meiryo", Arial, sans-serif;
  color:var(--charcoal);
  background: linear-gradient(180deg, #fff, #fff 55%, #fafafa);
  line-height:1.65;
}
a{color:inherit}
.wrap{max-width:var(--max); margin:0 auto; padding:0 20px;}
.nav{
  position:sticky; top:0; z-index:10;
  backdrop-filter:saturate(180%) blur(12px);
  background: rgba(255,255,255,.82);
  border-bottom:1px solid rgba(0,0,0,.06);
}
.nav-inner{
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 0; gap:12px; flex-wrap:wrap;
}
.brandmark{display:flex; align-items:center; gap:10px; font-weight:800; letter-spacing:.2px;}
.dot{width:12px;height:12px;border-radius:999px;background:var(--gold); box-shadow:0 0 0 4px rgba(198,167,94,.22);}
.navlinks{display:flex; gap:10px; flex-wrap:wrap;}
.navlinks a{
  text-decoration:none; font-size:14px; color:#111827;
  padding:8px 10px; border-radius:12px;
}
.navlinks a:hover{background:rgba(11,31,59,.06)}
.hero{
  padding:72px 0 36px;
  background:
    radial-gradient(900px 500px at 20% -10%, rgba(198,167,94,.25), transparent 60%),
    radial-gradient(900px 500px at 90% 10%, rgba(11,31,59,.12), transparent 60%);
}
.hero.cafe{
  background:
    radial-gradient(900px 500px at 20% -10%, rgba(227,139,41,.22), transparent 60%),
    radial-gradient(900px 500px at 90% 10%, rgba(140,106,75,.14), transparent 60%);
}
.hero-grid{
  display:grid; grid-template-columns: 1.2fr .8fr; gap:28px; align-items:stretch;
}
.kicker{
  display:inline-flex; align-items:center; gap:10px;
  font-size:13px; color:var(--muted);
  padding:8px 12px; border:1px solid rgba(0,0,0,.08);
  border-radius:999px; background:rgba(255,255,255,.7);
}
h1{
  margin:14px 0 10px;
  font-size: clamp(30px, 4vw, 46px);
  line-height:1.18; letter-spacing:-.6px;
}
.lead{font-size:16px; color:#374151; margin:0 0 18px; max-width: 62ch;}
.cta{display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-top:18px;}
.btn{
  display:inline-flex; align-items:center; justify-content:center;
  padding:12px 16px; border-radius:14px;
  border:1px solid rgba(0,0,0,.12);
  text-decoration:none; font-weight:800; font-size:14px;
  transition:.15s ease;
}
.btn.primary{background:var(--navy); color:#fff; border-color:transparent; box-shadow:0 10px 20px rgba(11,31,59,.18);}
.btn.primary:hover{transform:translateY(-1px)}
.btn.ghost:hover{background:rgba(11,31,59,.06)}
.btn.orange{background:var(--orange); color:#fff; border-color:transparent; box-shadow:0 10px 20px rgba(227,139,41,.20);}
.btn.orange:hover{transform:translateY(-1px)}
.card{
  background:var(--card);
  border:1px solid rgba(0,0,0,.08);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:18px;
}
.cards{display:grid; grid-template-columns: repeat(3, 1fr); gap:16px;}
.section{padding:56px 0;}
.section-title{display:flex; align-items:flex-end; justify-content:space-between; gap:10px; margin-bottom:18px; flex-wrap:wrap;}
.section-title h2{margin:0; font-size:24px; letter-spacing:-.3px;}
.section-title p{margin:0; color:var(--muted); font-size:14px;}
.tag{
  display:inline-flex; align-items:center; gap:8px;
  font-size:12px; padding:6px 10px; border-radius:999px;
  border:1px solid rgba(0,0,0,.10); background:rgba(255,255,255,.7);
  color:#111827;
}
.card h3{margin:10px 0 8px; font-size:16px;}
.card p{margin:0; color:#374151; font-size:14px;}
.panel{
  border-radius:var(--radius);
  border:1px solid rgba(0,0,0,.08);
  overflow:hidden;
  box-shadow:var(--shadow);
  background:#fff;
}
.panel .head{
  padding:18px;
  color:#fff;
  background: linear-gradient(135deg, var(--navy), #0A2A57);
}
.panel.cafe .head{
  color:#1f2937;
  background: linear-gradient(135deg, var(--beige), #fff);
}
.brand-badge{
  width:52px; height:52px; border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  font-weight:900; letter-spacing:.5px;
  border:1px solid rgba(255,255,255,.18);
  background: rgba(255,255,255,.12);
}
.panel.cafe .brand-badge{
  background: rgba(227,139,41,.12);
  border:1px solid rgba(227,139,41,.25);
}
.panel .head h3{margin:10px 0 0; font-size:18px;}
.panel .head p{margin:6px 0 0; opacity:.9; font-size:14px;}
.panel .body{padding:18px;}
.list{margin:0; padding-left:18px; color:#374151;}
.list li{margin:6px 0;}
.grid-2{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
.grid-1{display:grid; grid-template-columns:1fr; gap:12px;}
.tline{display:grid; gap:10px;}
.step{
  display:flex; gap:14px; align-items:flex-start;
  padding:14px 16px;
  background:#fff;
  border:1px solid rgba(0,0,0,.08);
  border-radius:14px;
}
.badge{
  width:34px; height:34px; border-radius:12px;
  background: rgba(198,167,94,.22);
  display:flex; align-items:center; justify-content:center;
  font-weight:900; color:var(--navy);
  flex:0 0 auto;
}
.hr{height:1px;background:rgba(0,0,0,.08);margin:14px 0;}
.small{font-size:12px;color:var(--muted);}
.mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;}
.footer{
  padding:26px 0 40px;
  color:var(--muted);
  border-top:1px solid rgba(0,0,0,.06);
  background:#fff;
}
.footgrid{display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:center;}
@media (max-width: 980px){
  .hero-grid{grid-template-columns:1fr;}
  .cards{grid-template-columns:1fr;}
  .grid-2{grid-template-columns:1fr;}
}